services:

  coach-socket:
    build: .
    image: slack-coach:latest
    container_name: slack_coach_socket
    env_file:
      - .env
    environment:
      - RUN_MODE=socket
      - STATE_DIR=/state
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - "${HOST_STATE_DIR:-./state}:/state:rw"
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"

  coach-cron:
    build: .
    image: slack-coach:latest
    container_name: slack_coach_cron
    env_file:
      - .env
    environment:
      - RUN_MODE=cron
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 10 * * 1-5}
      - STATE_DIR=/state
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_MODE=bot
      - SLACK_CHANNEL_ID_VIEW=${SLACK_CHANNEL_ID_VIEW}
      - SLACK_CHANNEL_ID_DATA_ENG=${SLACK_CHANNEL_ID_DATA_ENG}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - PYTHONPATH=/app:/app/app
    volumes:
      - "${HOST_STATE_DIR:-./state}:/state:rw"
    restart: unless-stopped
    user: "0:0"
